name: Publish GitHub Packages mirror

on:
  release:
    types: [created]

permissions:
  contents: read
  packages: write

jobs:
  publish-github-packages:
    name: Publish @bg-qwq/findingbridge mirror
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
          scope: '@bg-qwq'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Build package
        run: npm run build

      - name: Rewrite package metadata for GitHub Packages mirror
        run: |
          npm pkg set name=@bg-qwq/findingbridge
          npm pkg set publishConfig.registry=https://npm.pkg.github.com/

      - name: Validate mirror package contents
        run: npm pack --dry-run

      - name: Publish mirror to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
